<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glyphs: Lexicon Engine</title>
    <style id="dynamic-styles">
        :root { --bg: #000; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; touch-action: none; padding: 20px 0; -webkit-user-select: none; }
        .grid { display: grid; width: 92vw; max-width: 400px; aspect-ratio: 1/1; pointer-events: none; z-index: 5; }
        .cell { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 100%; font-size: 8px; font-weight: 900; pointer-events: auto; }
        .tile { width: 46px; height: 46px; background: #fff; color: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; position: absolute; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); touch-action: none; pointer-events: auto; }
        .tile.on-board { width: 100%; height: 100%; border-radius: 0; left: 0 !important; top: 0 !important; }
        .tile.fixed { filter: brightness(0.8); pointer-events: none; }
        .tile.dragging { z-index: 2000; opacity: 0.95; pointer-events: none; }
        .val { position: absolute; bottom: 2px; right: 4px; font-size: 9px; opacity: 0.6; }
        .controls { display: flex; gap: 10px; z-index: 10; }
        .btn { background: #222; color: #fff; border: none; padding: 14px 24px; border-radius: 30px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; }
        .primary { background: #fff; color: #000; }
    </style>
</head>
<body>
    <header id="game-header"></header>
    <div class="grid" id="grid"></div>
    <div class="controls" id="ui-controls"></div>
    <div id="rack" style="height: 100px; width: 100%;"></div>

    <script>
        let layout, board, tiles, theme, ui, rules, playRules, dictionary = new Set(), bag = [], placedTiles = [];

        async function startEngine() {
            try {
                const [l, b, t, th, u, r, p] = await Promise.all([
                    fetch('./lexicon/layout.json').then(res => res.json()),
                    fetch('./lexicon/board.json').then(res => res.json()),
                    fetch('./lexicon/tiles.json').then(res => res.json()),
                    fetch('./lexicon/theme.json').then(res => res.json()),
                    fetch('./lexicon/ui.json').then(res => res.json()),
                    fetch('./lexicon/rules.json').then(res => res.json()),
                    fetch('./lexicon/play.json').then(res => res.json())
                ]);
                
                layout = l; board = b; tiles = t; theme = th; ui = u; rules = r; playRules = p;
                const dText = await fetch(playRules.validation.dictionaryUrl).then(r => r.text());
                dictionary = new Set(dText.toUpperCase().split('\n'));

                applyLexiconTheme(); buildHeader(); buildGrid(); buildUI(); initBag(); refillRack();
            } catch (e) { console.error("Engine failure:", e); }
        }

        function handlePlayWord() {
            if(!placedTiles.length) return;
            
            placedTiles.sort((a,b) => a.index - b.index);
            const first = placedTiles[0].index;
            const last = placedTiles[placedTiles.length-1].index;
            
            // Vector logic parsed from play.json
            const isHoriz = (last - first) < board.cols;
            const step = isHoriz ? playRules.vectors.horizontal.step : playRules.vectors.vertical.step;

            let fullIndices = [];
            let current = first;
            
            // Recursive scan leveraging board data
            while(current >= 0 && getTileAt(current - step)) { current -= step; }
            while(current < board.size && getTileAt(current)) {
                fullIndices.push(current);
                current += step;
            }

            const word = fullIndices.map(idx => getTileAt(idx).dataset.letter).join('');

            if(dictionary.has(word)) {
                alert(`LEXICON VALID: ${word}`);
                placedTiles.forEach(p => {
                    p.el.classList.add('fixed');
                    if(playRules.mechanics.lockOnPlay) p.el.style.pointerEvents = 'none';
                });
                placedTiles = [];
                refillRack();
            } else {
                alert(`DICTIONARY REJECT: ${word}`);
            }
        }

        function getTileAt(index) { return document.querySelector(`.cell[data-index="${index}"] .tile`); }

        /* --- THEME & UI (PARSED FROM LEXICONS) --- */
        function applyLexiconTheme() {
            const root = document.documentElement.style;
            Object.keys(theme.colors).forEach(key => root.setProperty(`--${key}`, theme.colors[key]));
            const styleSheet = document.createElement("style");
            styleSheet.innerText = `.grid { grid-template-columns: repeat(${board.cols}, 1fr); grid-auto-rows: 1fr; gap: ${board.gap}; border: 1px solid var(--gridLine); } .cell { background: var(--obsidian); backdrop-filter: blur(${theme.effects.blurStrength}); -webkit-backdrop-filter: blur(${theme.effects.blurStrength}); } .dl { color: var(--dl); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--dl); } .tl { color: var(--tl); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--tl); } .dw { color: var(--dw); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--dw); } .tw { color: var(--tw); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--tw); } .dd { color: var(--dd); box-shadow: inset 0 0 ${theme.effects.ddGlowSize} var(--dd); } #total-score { color: var(--gold); }`;
            document.head.appendChild(styleSheet);
        }
        function buildHeader() { document.getElementById('game-header').innerHTML = `<div id="total-score" style="font-size: 2.2rem; font-weight: 900;">${ui.header.scoreLabel}</div>`; }
        function buildGrid() { const g = document.getElementById('grid'); for(let i=0; i < board.size; i++) { const c = document.createElement('div'); c.className = 'cell'; c.dataset.index = i; if(layout[i]) { c.innerText = layout[i].t; c.classList.add(layout[i].c); } g.appendChild(c); } }
        function buildUI() { const ctrl = document.getElementById('ui-controls'); ui.buttons.forEach(btn => { const b = document.createElement('button'); b.className = btn.class; b.innerText = btn.text; if(btn.action === 'recall') b.onclick = () => location.reload(); if(btn.action === 'play') b.onclick = handlePlayWord; ctrl.appendChild(b); }); }
        function initBag() { tiles.distribution.forEach(d => { for(let i=0; i<d.q; i++) bag.push({...d}); }); bag.sort(() => Math.random() - 0.5); }
        function refillRack() { const startX = (window.innerWidth / 2) - ((7 * 50) / 2); const currentHand = document.querySelectorAll('.tile:not(.on-board)').length; for(let i=0; i < (7-currentHand) && bag.length; i++) { const data = bag.pop(); const t = document.createElement('div'); t.className = 'tile'; t.innerHTML = `<span>${data.l === '?' ? '' : data.l}</span><span class="val">${data.v}</span>`; t.dataset.letter = data.l; t.dataset.origX = `${startX + ((currentHand+i) * 50)}px`; t.style.left = t.dataset.origX; t.style.bottom = "25px"; makeDraggable(t); document.body.appendChild(t); } }
        function makeDraggable(el) { let ox, oy; const start = (e) => { if(el.classList.contains('fixed')) return; const t = e.touches ? e.touches[0] : e; const r = el.getBoundingClientRect(); ox = t.clientX - r.left; oy = t.clientY - r.top; if(el.parentElement.classList.contains('cell')) { placedTiles = placedTiles.filter(p => p.el !== el); document.body.appendChild(el); el.classList.remove('on-board'); el.style.width = '46px'; el.style.height = '46px'; } el.classList.add('dragging'); if(e.cancelable) e.preventDefault(); }; const move = (e) => { if(!el.classList.contains('dragging')) return; const t = e.touches ? e.touches[0] : e; el.style.left = `${t.clientX - ox}px`; el.style.top = `${t.clientY - oy}px`; el.style.bottom = 'auto'; if(e.cancelable) e.preventDefault(); }; const end = (e) => { if(!el.classList.contains('dragging')) return; el.classList.remove('dragging'); const r = el.getBoundingClientRect(); el.style.visibility = 'hidden'; const hit = document.elementFromPoint(r.left + r.width/2, r.top + r.height/2); const target = hit?.closest('.cell'); el.style.visibility = 'visible'; if(target && !target.querySelector('.tile')) { target.appendChild(el); el.classList.add('on-board'); el.style.width = '100%'; el.style.height = '100%'; placedTiles.push({el, index: parseInt(target.dataset.index)}); } else { el.style.left = el.dataset.origX; el.style.bottom = "25px"; el.style.top = 'auto'; el.style.width = '46px'; el.style.height = '46px'; } }; el.addEventListener('touchstart', start, { passive: false }); window.addEventListener('touchmove', move, { passive: false }); window.addEventListener('touchend', end, { passive: false }); }

        startEngine();
    </script>
</body>
</html>
