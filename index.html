<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blitz Cross: Frosted Edition</title>
    <style>
        :root {
            --bg: #000000;
            --grid-line: rgba(255, 255, 255, 0.15);
            --dl: #00FFFF; --tl: #7851A9; --dw: #FF8C00; --tw: #E0115F; --dd: #FFD700;
            --glass-base: rgba(240, 240, 240, 0.85);
        }
        body { 
            background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
            overflow: hidden; touch-action: none; 
        }
        header { width: 100%; padding: 15px; text-align: center; letter-spacing: 5px; font-weight: 900; border-bottom: 1px solid #111; }
        
        .grid { 
            display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); 
            width: 94vw; max-width: 480px; aspect-ratio: 1/1; 
            background: var(--grid-line); gap: 1px; border: 1px solid var(--grid-line); margin-top: 15px;
        }
        .cell { background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 900; }
        
        /* Board Glows */
        .s { background: #fff; color: #000; box-shadow: 0 0 20px #fff; border-radius: 2px; font-size: 14px; z-index: 2; }
        .dl { color: var(--dl); box-shadow: inset 0 0 10px var(--dl); }
        .tl { color: var(--tl); box-shadow: inset 0 0 10px var(--tl); }
        .dw { color: var(--dw); box-shadow: inset 0 0 10px var(--dw); }
        .tw { color: var(--tw); box-shadow: inset 0 0 10px var(--tw); }
        .dd { color: var(--dd); box-shadow: inset 0 0 15px var(--dd), 0 0 8px rgba(255,215,0,0.3); border: 1px solid var(--dd); font-size: 10px; z-index: 1; }

        /* THE FROSTED GLASS SQUIRKLE TILES */
        .rack { margin-top: auto; margin-bottom: 40px; display: flex; gap: 8px; padding: 10px; }
        .tile {
            width: 46px; height: 46px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(200,200,200,0.8) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 14px; /* Perfect Squircle */
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 6px 15px rgba(0,0,0,0.6), inset 0 1px 2px #fff;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 24px; font-weight: 900; position: relative;
        }
        .val { position: absolute; bottom: 3px; right: 6px; font-size: 9px; font-weight: 800; color: rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <header>BLITZ CROSS</header>
    <div class="grid" id="grid"></div>
    <div class="rack" id="rack"></div>

    <script>
        const grid = document.getElementById('grid');
        
        // Locked Tile Placement
        const layout = {
            60: { t: '✦', c: 's' },
            0: { t: 'TL', c: 'tl' }, 10: { t: 'TL', c: 'tl' }, 24: { t: 'TL', c: 'tl' }, 30: { t: 'TL', c: 'tl' },
            90: { t: 'TL', c: 'tl' }, 96: { t: 'TL', c: 'tl' }, 110: { t: 'TL', c: 'tl' }, 120: { t: 'TL', c: 'tl' },
            3: { t: 'TW', c: 'tw' }, 7: { t: 'TW', c: 'tw' }, 33: { t: 'TW', c: 'tw' }, 43: { t: 'TW', c: 'tw' },
            77: { t: 'TW', c: 'tw' }, 87: { t: 'TW', c: 'tw' }, 113: { t: 'TW', c: 'tw' }, 117: { t: 'TW', c: 'tw' },
            12: { t: 'DL', c: 'dl' }, 20: { t: 'DL', c: 'dl' }, 36: { t: 'DL', c: 'dl' }, 40: { t: 'DL', c: 'dl' },
            80: { t: 'DL', c: 'dl' }, 84: { t: 'DL', c: 'dl' }, 100: { t: 'DL', c: 'dl' }, 108: { t: 'DL', c: 'dl' },
            16: { t: 'DW', c: 'dw' }, 48: { t: 'DW', c: 'dw' }, 50: { t: 'DW', c: 'dw' }, 56: { t: 'DW', c: 'dw' },
            104: { t: 'DW', c: 'dw' }, 64: { t: 'DW', c: 'dw' }, 70: { t: 'DW', c: 'dw' }, 72: { t: 'DW', c: 'dw' },
            26: { t: 'DD', c: 'dd' }, 28: { t: 'DD', c: 'dd' }, 46: { t: 'DD', c: 'dd' }, 52: { t: 'DD', c: 'dd' },
            68: { t: 'DD', c: 'dd' }, 74: { t: 'DD', c: 'dd' }, 92: { t: 'DD', c: 'dd' }, 94: { t: 'DD', c: 'dd' }
        };

        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (layout[i]) { cell.innerText = layout[i].t; cell.classList.add(layout[i].c); }
            grid.appendChild(cell);
        }

        // Custom Distribution Logic
        const distribution = [
            {l: 'E', v: 1, q: 10}, {l: 'A', v: 1, q: 8}, {l: 'I', v: 1, q: 7}, {l: 'O', v: 1, q: 7},
            {l: 'N', v: 1, q: 5}, {l: 'R', v: 1, q: 5}, {l: 'T', v: 1, q: 5}, {l: 'L', v: 1, q: 4},
            {l: 'S', v: 1, q: 4}, {l: 'D', v: 2, q: 4}, {l: 'U', v: 2, q: 4}, {l: 'G', v: 2, q: 3},
            {l: 'H', v: 3, q: 2}, {l: 'M', v: 3, q: 2}, {l: 'Y', v: 3, q: 2}, {l: 'B', v: 4, q: 2},
            {l: 'C', v: 4, q: 2}, {l: 'F', v: 4, q: 2}, {l: 'P', v: 4, q: 2}, {l: 'W', v: 4, q: 2},
            {l: 'K', v: 5, q: 1}, {l: 'V', v: 5, q: 2}, {l: 'J', v: 8, q: 1}, {l: 'X', v: 8, q: 1},
            {l: 'Q', v: 10, q: 1}, {l: 'Z', v: 10, q: 1}, {l: ' ', v: 0, q: 2}
        ];

        let bag = [];
        distribution.forEach(item => {
            for(let i=0; i<item.q; i++) bag.push({l: item.l, v: item.v});
        });

        // Shuffle Bag
        bag.sort(() => Math.random() - 0.5);

        // Draw 7 Tiles
        for(let i=0; i<7; i++) {
            const data = bag.pop();
            const t = document.createElement('div');
            t.className = 'tile';
            t.innerHTML = `${data.l}<span class="val">${data.v}</span>`;
            document.getElementById('rack').appendChild(t);
        }
    </script>
</body>
</html>
