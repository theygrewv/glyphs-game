<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blitz Cross</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; box-sizing: border-box; letter-spacing: 4px; font-weight: 900; font-size: 18px; border-bottom: 1px solid #1a1a1a; }
        .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 1px; width: 95vw; max-width: 450px; aspect-ratio: 1; background: #1a1a1a; border: 1px solid #1a1a1a; margin-top: 15px; }
        .cell { background: #000; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; position: relative; }
        /* Premium Glows */
        .dd { box-shadow: inset 0 0 12px #FFD700; color: #FFD700; }
        .tw { box-shadow: inset 0 0 12px #E0115F; color: #E0115F; }
        .tl { box-shadow: inset 0 0 12px #7851A9; color: #7851A9; }
        .dw { box-shadow: inset 0 0 12px #FF8C00; color: #FF8C00; }
        .dl { box-shadow: inset 0 0 12px #00FFFF; color: #00FFFF; }
        .center { box-shadow: inset 0 0 15px #FFD700; color: #FFD700; font-size: 14px; }
        /* The Onyx Rack */
        .rack { margin-top: auto; margin-bottom: 30px; display: flex; gap: 6px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 20px; }
        .tile { width: 42px; height: 42px; background: linear-gradient(145deg, #222, #000); border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.8); position: relative; }
        .val { position: absolute; bottom: 3px; right: 5px; font-size: 7px; color: #666; }
    </style>
</head>
<body>
    <header><span>BLITZ CROSS</span><span style="color:#FFD700">@LIVE</span></header>
    <div class="grid" id="grid"></div>
    <div class="rack" id="rack"></div>

    <script>
        const grid = document.getElementById('grid');
        const rackEl = document.getElementById('rack');
        // Bonus placements for 11x11
        const bonuses = { 0:'DD', 10:'DD', 110:'DD', 120:'DD', 60:'✦', 5:'TW', 55:'TW', 65:'TW', 115:'TW', 12:'TL', 20:'TL', 100:'TL', 108:'TL' };
        
        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (bonuses[i]) {
                cell.className += ' ' + bonuses[i].toLowerCase().replace('✦', 'center');
                cell.innerText = bonuses[i];
            }
            grid.appendChild(cell);
        }

        const myTiles = [['B',4],['L',1],['I',1],['T',1],['Z',10],['C',4],['X',8]];
        myTiles.forEach(t => {
            const div = document.createElement('div');
            div.className = 'tile';
            div.innerHTML = `${t[0]}<span class="val">${t[1]}</span>`;
            rackEl.appendChild(div);
        });
    </script>
</body>
</html>
