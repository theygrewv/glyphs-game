<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blitz Cross: Frosted Edition</title>
    <style>
        :root {
            --bg: #000000;
            --grid-line: rgba(255, 255, 255, 0.15);
            --dl: #00FFFF; --tl: #7851A9; --dw: #FF8C00; --tw: #E0115F; --dd: #FFD700;
        }
        
        /* Box-sizing reset to keep padding from growing elements */
        * { box-sizing: border-box; }

        body { 
            background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; /* Evenly spaces Header, Grid, and Rack */
            height: 100vh; height: -webkit-fill-available;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            overflow: hidden; touch-action: none; 
        }

        header { 
            width: 100%; padding: 10px; text-align: center; 
            letter-spacing: 5px; font-weight: 900; border-bottom: 1px solid #111; 
            font-size: 0.9rem; flex-shrink: 0;
        }
        
        /* Scaled down grid to ensure vertical clearance */
        .grid { 
            display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); 
            width: 85vw; max-width: 400px; aspect-ratio: 1/1; 
            background: var(--grid-line); gap: 1px; border: 1px solid var(--grid-line);
            flex-shrink: 0;
        }
        
        .cell { background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 900; }
        
        /* Board Glows */
        .s { background: #fff; color: #000; box-shadow: 0 0 15px #fff; border-radius: 2px; font-size: 12px; z-index: 2; }
        .dl { color: var(--dl); box-shadow: inset 0 0 8px var(--dl); }
        .tl { color: var(--tl); box-shadow: inset 0 0 8px var(--tl); }
        .dw { color: var(--dw); box-shadow: inset 0 0 8px var(--dw); }
        .tw { color: var(--tw); box-shadow: inset 0 0 8px var(--tw); }
        .dd { color: var(--dd); box-shadow: inset 0 0 12px var(--dd), 0 0 5px rgba(255,215,0,0.3); border: 1px solid var(--dd); font-size: 9px; z-index: 1; }

        /* SCALED RACK FOR PIXEL 9 */
        .rack { 
            display: flex; gap: 5px; padding: 20px 10px; 
            flex-wrap: nowrap; justify-content: center; 
            width: 100%; flex-shrink: 0;
        }

        .tile {
            width: 12vw; height: 12vw; max-width: 42px; max-height: 42px;
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(210,210,210,0.8) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 8px rgba(0,0,0,0.6), inset 0 1px 1px #fff;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 18px; font-weight: 900; position: relative;
            cursor: pointer;
        }

        .val { position: absolute; bottom: 2px; right: 4px; font-size: 7px; font-weight: 800; color: rgba(0,0,0,0.5); }
        .wild { color: #E0115F; }
    </style>
</head>
<body>
    <header>BLITZ CROSS</header>
    <div class="grid" id="grid"></div>
    <div class="rack" id="rack"></div>

    <script>
        const grid = document.getElementById('grid');
        const layout = {
            60: { t: '✦', c: 's' },
            0: { t: 'TL', c: 'tl' }, 10: { t: 'TL', c: 'tl' }, 24: { t: 'TL', c: 'tl' }, 30: { t: 'TL', c: 'tl' },
            90: { t: 'TL', c: 'tl' }, 96: { t: 'TL', c: 'tl' }, 110: { t: 'TL', c: 'tl' }, 120: { t: 'TL', c: 'tl' },
            3: { t: 'TW', c: 'tw' }, 7: { t: 'TW', c: 'tw' }, 33: { t: 'TW', c: 'tw' }, 43: { t: 'TW', c: 'tw' },
            77: { t: 'TW', c: 'tw' }, 87: { t: 'TW', c: 'tw' }, 113: { t: 'TW', c: 'tw' }, 117: { t: 'TW', c: 'tw' },
            12: { t: 'DL', c: 'dl' }, 20: { t: 'DL', c: 'dl' }, 36: { t: 'DL', c: 'dl' }, 40: { t: 'DL', c: 'dl' },
            80: { t: 'DL', c: 'dl' }, 84: { t: 'DL', c: 'dl' }, 100: { t: 'DL', c: 'dl' }, 108: { t: 'DL', c: 'dl' },
            16: { t: 'DW', c: 'dw' }, 48: { t: 'DW', c: 'dw' }, 50: { t: 'DW', c: 'dw' }, 56: { t: 'DW', c: 'dw' },
            104: { t: 'DW', c: 'dw' }, 64: { t: 'DW', c: 'dw' }, 70: { t: 'DW', c: 'dw' }, 72: { t: 'DW', c: 'dw' },
            26: { t: 'DD', c: 'dd' }, 28: { t: 'DD', c: 'dd' }, 46: { t: 'DD', c: 'dd' }, 52: { t: 'DD', c: 'dd' },
            68: { t: 'DD', c: 'dd' }, 74: { t: 'DD', c: 'dd' }, 92: { t: 'DD', c: 'dd' }, 94: { t: 'DD', c: 'dd' }
        };

        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (layout[i]) { cell.innerText = layout[i].t; cell.classList.add(layout[i].c); }
            grid.appendChild(cell);
        }

        const distribution = [
            {l: 'E', v: 1, q: 10}, {l: 'A', v: 1, q: 8}, {l: 'I', v: 1, q: 7}, {l: 'O', v: 1, q: 7},
            {l: 'N', v: 1, q: 5}, {l: 'R', v: 1, q: 5}, {l: 'T', v: 1, q: 5}, {l: 'L', v: 1, q: 4},
            {l: 'S', v: 1, q: 4}, {l: 'D', v: 2, q: 4}, {l: 'U', v: 2, q: 4}, {l: 'G', v: 2, q: 3},
            {l: 'H', v: 3, q: 2}, {l: 'M', v: 3, q: 2}, {l: 'Y', v: 3, q: 2}, {l: 'B', v: 4, q: 2},
            {l: 'C', v: 4, q: 2}, {l: 'F', v: 4, q: 2}, {l: 'P', v: 4, q: 2}, {l: 'W', v: 4, q: 2},
            {l: 'K', v: 5, q: 1}, {l: 'V', v: 5, q: 2}, {l: 'J', v: 8, q: 1}, {l: 'X', v: 8, q: 1},
            {l: 'Q', v: 10, q: 1}, {l: 'Z', v: 10, q: 1}, {l: '?', v: 0, q: 2}
        ];

        let bag = [];
        distribution.forEach(item => {
            for(let i=0; i<item.q; i++) bag.push({l: item.l, v: item.v});
        });
        bag.sort(() => Math.random() - 0.5);

        function createTile(data) {
            const t = document.createElement('div');
            t.className = 'tile';
            t.innerHTML = `<span class="letter">${data.l === '?' ? '' : data.l}</span><span class="val">${data.v}</span>`;
            t.onclick = () => {
                if (data.l === '?') {
                    let choice = prompt("Enter a letter for Wild Card:");
                    if (choice && choice.length === 1) {
                        t.querySelector('.letter').innerText = choice.toUpperCase();
                        t.querySelector('.letter').classList.add('wild');
                        t.querySelector('.val').innerText = '2';
                    }
                }
            };
            return t;
        }

        for(let i=0; i<7; i++) {
            const data = bag.pop();
            document.getElementById('rack').appendChild(createTile(data));
        }
    </script>
</body>
</html>
