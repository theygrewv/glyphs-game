<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glyphs: Lexicon Engine</title>
    <style id="dynamic-styles">
        :root { --bg: #000; --text: #fff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; touch-action: none; padding: 10px 0; transition: background 0.5s; }
        .grid { display: grid; width: 92vw; max-width: 400px; aspect-ratio: 1/1; z-index: 5; position: relative; }
        .cell { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 100%; box-shadow: var(--bevel); }
        #rack { display: flex; justify-content: center; align-items: center; gap: 10px; width: 92vw; max-width: 400px; height: 80px; margin-bottom: 60px; z-index: 10; }
        .tile { width: 44px; height: 44px; background: var(--text); color: var(--bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .tile.dragging { position: fixed !important; z-index: 5000; pointer-events: none; transform: scale(1.3); opacity: 0.9; }
        .tile.on-board { position: absolute; width: 100%; height: 100%; border-radius: 0; left: 0 !important; top: 0 !important; }
        .btn { background: #222; color: #fff; border: none; padding: 12px 20px; border-radius: 30px; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; }
        .toggle-btn { font-size: 1.2rem; padding: 8px 15px; }
        .primary { background: var(--text); color: var(--bg); }
    </style>
</head>
<body>
    <header id="game-header"></header>
    <div class="grid" id="grid"></div>
    <div class="controls" id="ui-controls"></div>
    <div id="rack"></div>

    <script>
        let layout, board, tiles, theme, ui, rules, playRules, drawRules, currentMode = 'dark';
        let dictionary = new Set(), bag = [], placedTiles = [], totalScore = 0;

        async function startEngine() {
            try {
                const [l, b, t, th, u, r, p, d] = await Promise.all([
                    fetch('./lexicon/layout.json').then(res => res.json()),
                    fetch('./lexicon/board.json').then(res => res.json()),
                    fetch('./lexicon/tiles.json').then(res => res.json()),
                    fetch('./lexicon/theme.json').then(res => res.json()),
                    fetch('./lexicon/ui.json').then(res => res.json()),
                    fetch('./lexicon/rules.json').then(res => res.json()),
                    fetch('./lexicon/play.json').then(res => res.json()),
                    fetch('./lexicon/draw.json').then(res => res.json())
                ]);
                layout = l; board = b; tiles = t; theme = th; ui = u; rules = r; playRules = p; drawRules = d;
                currentMode = theme.active || 'dark';
                
                const dText = await fetch(playRules.validation.dictionaryUrl).then(r => r.text());
                dictionary = new Set(dText.toUpperCase().split('\n'));
                
                applyLexiconTheme(); buildHeader(); buildGrid(); buildUI(); initBag(); refillRack();
            } catch (e) { console.error(e); }
        }

        function applyLexiconTheme() {
            const root = document.documentElement.style;
            const m = theme.modes[currentMode];
            
            // Set Variables
            Object.keys(m.colors).forEach(k => root.setProperty(`--${k}`, m.colors[k]));
            root.setProperty('--bevel', m.effects.bevel);
            
            const styleSheet = document.getElementById('lexicon-styles') || document.createElement("style");
            styleSheet.id = 'lexicon-styles';
            styleSheet.innerText = `
                .grid { grid-template-columns: repeat(${board.cols}, 1fr); grid-auto-rows: 1fr; gap: ${board.gap}; border: 1px solid var(--gridLine); }
                .cell { background: var(--obsidian); backdrop-filter: blur(${m.effects.blur}); -webkit-backdrop-filter: blur(${m.effects.blur}); }
                .dl { color: var(--dl); box-shadow: inset 0 0 ${m.effects.glow} var(--dl); }
                .tl { color: var(--tl); box-shadow: inset 0 0 ${m.effects.glow} var(--tl); }
                .dw { color: var(--dw); box-shadow: inset 0 0 ${m.effects.glow} var(--dw); }
                .tw { color: var(--tw); box-shadow: inset 0 0 ${m.effects.glow} var(--tw); }
                .dd { color: var(--dd); box-shadow: inset 0 0 ${m.effects.glow} var(--dd); }
                #total-score { color: var(--gold); }
            `;
            document.head.appendChild(styleSheet);
        }

        function buildUI() {
            const ctrl = document.getElementById('ui-controls');
            ctrl.innerHTML = '';
            ui.buttons.forEach(btn => {
                const b = document.createElement('button');
                b.className = btn.class; b.innerText = btn.text;
                if(btn.action === 'toggleTheme') b.onclick = toggleMode;
                if(btn.action === 'recall') b.onclick = () => location.reload();
                if(btn.action === 'play') b.onclick = handlePlayWord;
                ctrl.appendChild(b);
            });
        }

        function toggleMode() {
            currentMode = currentMode === 'dark' ? 'light' : 'dark';
            applyLexiconTheme();
            // Optional: update UI if button text changes based on mode
        }

        /* --- DRAG, GRID, REFILL (STAY CONSISTENT) --- */
        function buildGrid() { const g = document.getElementById('grid'); g.innerHTML = ''; for(let i=0; i < board.size; i++) { const c = document.createElement('div'); c.className = 'cell'; c.dataset.index = i; if(layout[i]) { c.innerText = layout[i].t; c.classList.add(layout[i].c); } g.appendChild(c); } }
        function buildHeader() { document.getElementById('game-header').innerHTML = `<div id="total-score" style="font-size: 2.2rem; font-weight: 900;">000</div>`; }
        function initBag() { tiles.distribution.forEach(d => { for(let i=0; i<d.q; i++) bag.push({...d}); }); bag.sort(() => Math.random() - 0.5); }
        function refillRack() { const r = document.getElementById('rack'); const cur = r.querySelectorAll('.tile').length; for(let i=0; i<(7-cur) && bag.length; i++) { const data = bag.pop(); const t = document.createElement('div'); t.className = 'tile'; t.innerHTML = `<span>${data.l === '?' ? '' : data.l}</span><span class="val">${data.v}</span>`; t.dataset.letter = data.l; t.dataset.value = data.v; r.appendChild(t); makeDraggable(t); } }
        function makeDraggable(el) { let ox, oy; const start = (e) => { if(el.classList.contains('fixed')) return; const t = e.touches ? e.touches[0] : e; const r = el.getBoundingClientRect(); ox = t.clientX - r.left; oy = t.clientY - r.top; if(el.parentElement.classList.contains('cell')) { placedTiles = placedTiles.filter(p => p.el !== el); el.classList.remove('on-board'); } el.classList.add('dragging'); el.style.left = `${t.clientX - ox}px`; el.style.top = `${t.clientY - oy}px`; if(e.cancelable) e.preventDefault(); }; const move = (e) => { if(!el.classList.contains('dragging')) return; const t = e.touches ? e.touches[0] : e; el.style.left = `${t.clientX - ox}px`; el.style.top = `${t.clientY - oy}px`; if(e.cancelable) e.preventDefault(); }; const end = (e) => { if(!el.classList.contains('dragging')) return; el.classList.remove('dragging'); const r = el.getBoundingClientRect(); const hit = document.elementFromPoint(r.left + r.width/2, r.top + r.height/2); const target = hit?.closest('.cell'); if(target && !target.querySelector('.tile')) { target.appendChild(el); el.classList.add('on-board'); el.style.left = '0'; el.style.top = '0'; placedTiles.push({el, index: parseInt(target.dataset.index)}); } else { document.getElementById('rack').appendChild(el); el.style.left = 'auto'; el.style.top = 'auto'; el.style.position = 'relative'; } }; el.addEventListener('touchstart', start, { passive: false }); window.addEventListener('touchmove', move, { passive: false }); window.addEventListener('touchend', end, { passive: false }); }
        function handlePlayWord() { /* Validation Logic */ if(!placedTiles.length) return; placedTiles.sort((a,b) => a.index-b.index); const isH = Math.floor(placedTiles[0].index/board.cols) === Math.floor(placedTiles[placedTiles.length-1].index/board.cols); const step = isH ? 1 : board.cols; let full = [], curr = placedTiles[0].index; while(curr >= 0 && getTileAt(curr-step)) curr -= step; while(curr < board.size && getTileAt(curr)) { full.push(curr); curr += step; } const word = full.map(idx => getTileAt(idx).dataset.letter).join(''); if(dictionary.has(word)) { placedTiles.forEach(p => p.el.classList.add('fixed')); placedTiles = []; refillRack(); } }
        function getTileAt(index) { return document.querySelector(`.cell[data-index="${index}"] .tile`); }

        startEngine();
    </script>
</body>
</html>
