<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glyphs: Lexicon Engine</title>
    <style id="dynamic-styles">
        :root { --bg: #000; --text: #fff; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; touch-action: none; padding: 10px 0; -webkit-user-select: none; }
        
        #drag-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; pointer-events: none; z-index: 1000000; }
        .grid { display: grid; width: 96vw; max-width: 400px; aspect-ratio: 1/1; z-index: 50; position: relative; }
        .cell { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; pointer-events: none; transition: background 0.2s; font-size: 0.65rem; font-weight: bold; }
        .cell.hover { background: rgba(255, 255, 255, 0.25) !important; box-shadow: inset 0 0 15px rgba(255,255,255,0.5); }
        #rack { display: flex; justify-content: center; align-items: center; gap: 6px; width: 96vw; max-width: 400px; height: 80px; margin-bottom: 75px; z-index: 10; }
        
        .tile { width: 44px; height: 44px; background: #fff; color: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.4); position: relative; pointer-events: auto !important; touch-action: none; z-index: 100; transform-origin: center; }
        .tile.dragging { position: absolute !important; left: 0 !important; top: 0 !important; margin: 0 !important; pointer-events: none; opacity: 0.98; box-shadow: 0 15px 30px rgba(0,0,0,0.7); }
        .tile.on-board { position: absolute; width: 100%; height: 100%; border-radius: 0; left: 0 !important; top: 0 !important; margin: 0 !important; box-shadow: none; font-size: 18px; z-index: 500 !important; }
        .tile.fixed { filter: brightness(0.85); pointer-events: none !important; }
        .tile.wild { color: var(--gold); }
        .val { position: absolute; bottom: 2px; right: 4px; font-size: 8px; opacity: 0.7; }

        #wildcard-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-title { color: #fff; font-weight: 900; margin-bottom: 20px; letter-spacing: 2px; }
        .wild-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 20px; background: #111; border-radius: 15px; border: 1px solid #333; }
        .wild-btn { width: 45px; height: 45px; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 8px; font-size: 1.2rem; }
        
        .feedback-node { position: absolute; z-index: 5000; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); font-size: 1.2rem; pointer-events: none; animation: floatUp 1.2s ease-out forwards; white-space: nowrap; }
        .invalid-x { color: #FF0000; text-shadow: 0 0 10px #FF0000; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-40px) scale(1.2); opacity: 0; } }

        .controls { display: flex; gap: 8px; z-index: 10; }
        .btn { background: #222; color: #fff; border: none; padding: 12px 18px; border-radius: 30px; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .primary { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div id="drag-layer"></div>
    <div id="wildcard-modal"><div class="modal-title" id="wild-title">SELECT GLYPH</div><div class="wild-grid" id="wild-grid"></div></div>
    <header id="game-header"></header>
    <div class="grid" id="grid"></div>
    <div class="controls" id="ui-controls"></div>
    <div id="rack"></div>

    <script>
        let layout, board, tiles, theme, ui, rules, playRules, scoring, wildLex, physics;
        let dictionary = new Set(), bag = [], placedTiles = [], totalScore = 0, currentMode = 'dark';
        let activeTile = null, targetX = 0, targetY = 0, currentX = 0, currentY = 0, wildTarget = null;

        async function startEngine() {
            try {
                const fetchJson = (url) => fetch(url).then(r => r.ok ? r.json() : null);
                const res = await Promise.all([
                    fetchJson('./lexicon/layout.json'), fetchJson('./lexicon/board.json'),
                    fetchJson('./lexicon/tiles.json'), fetchJson('./lexicon/theme.json'),
                    fetchJson('./lexicon/ui.json'), fetchJson('./lexicon/rules.json'),
                    fetchJson('./lexicon/play.json'), fetchJson('./lexicon/scoring.json'), 
                    fetchJson('./lexicon/wildcard.json'), fetchJson('./lexicon/physics.json')
                ]);
                [layout, board, tiles, theme, ui, rules, playRules, scoring, wildLex, physics] = res;
                currentMode = theme?.active || 'dark';
                
                if(playRules && playRules.validation.dictionaryUrl) {
                    const dText = await fetch(playRules.validation.dictionaryUrl).then(r => r.text());
                    dictionary = new Set(dText.toUpperCase().split('\n'));
                }
                
                applyLexiconTheme(); buildHeader(); buildGrid(); buildUI(); initBag(); refillRack(); setupWildcard();
                requestAnimationFrame(updateMotion);
            } catch (e) { console.error("Engine Error:", e); }
        }

        function updateMotion() {
            if (activeTile && physics) {
                const lerp = physics.motion.lerp || 0.4;
                currentX += (targetX - currentX) * lerp;
                currentY += (targetY - currentY) * lerp;
                activeTile.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) scale(${physics.motion.dragScale})`;
            }
            requestAnimationFrame(updateMotion);
        }
        function makeDraggable(el) {
            let ox, oy, gRect;
            const dragLayer = document.getElementById('drag-layer');

            const start = (e) => {
                if(el.classList.contains('fixed') || !physics) return;
                const t = e.touches ? e.touches[0] : e;
                ox = physics.tile.centerOffset; oy = physics.tile.centerOffset; 
                gRect = document.getElementById('grid').getBoundingClientRect();

                if(el.parentElement.classList.contains('cell')) {
                    placedTiles = placedTiles.filter(p => p.el !== el);
                    el.classList.remove('on-board'); 
                }
                
                activeTile = el; 
                el.style.width = `${physics.tile.size}px`; el.style.height = `${physics.tile.size}px`;
                el.style.position = 'absolute'; el.style.margin = '0px'; el.style.left = '0px'; el.style.top = '0px';
                
                dragLayer.appendChild(el);
                el.classList.add('dragging');
                
                currentX = t.clientX - ox; currentY = t.clientY - oy;
                targetX = currentX; targetY = currentY;
                el.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) scale(${physics.motion.dragScale})`;

                if(e.cancelable) e.preventDefault(); e.stopPropagation();
            };

            const move = (e) => {
                if(!activeTile || activeTile !== el || !physics) return;
                const t = e.touches ? e.touches[0] : e;
                targetX = t.clientX - ox; targetY = t.clientY - oy;
                
                document.querySelectorAll('.cell.hover').forEach(c => c.classList.remove('hover'));
                const col = Math.floor((t.clientX - gRect.left) / (gRect.width / board.cols));
                const row = Math.floor((t.clientY - gRect.top) / (gRect.height / (board.size / board.cols)));
                const idx = (row * board.cols) + col;
                if (idx >= 0 && idx < board.size && t.clientX >= gRect.left && t.clientX <= gRect.right) {
                    const targetCell = document.querySelector(`.cell[data-index="${idx}"]`);
                    if(targetCell && !targetCell.querySelector('.tile')) targetCell.classList.add('hover');
                }
            };

            const end = (e) => {
                if(!activeTile || activeTile !== el || !physics) return;
                el.classList.remove('dragging'); activeTile = null;
                const t = e.changedTouches ? e.changedTouches[0] : e;
                const slop = physics.bounds.hitSlop;

                if (t.clientX >= (gRect.left - slop) && t.clientX <= (gRect.right + slop) && t.clientY >= (gRect.top - slop) && t.clientY <= (gRect.bottom + slop)) {
                    const col = Math.floor((t.clientX - gRect.left) / (gRect.width / board.cols));
                    const row = Math.floor((t.clientY - gRect.top) / (gRect.height / (board.size / board.cols)));
                    const idx = (row * board.cols) + col;
                    const target = document.querySelector(`.cell[data-index="${idx}"]`);
                    
                    if (target && !target.querySelector('.tile')) {
                        target.appendChild(el); el.classList.add('on-board');
                        el.style.width = '100%'; el.style.height = '100%';
                        el.style.position = 'absolute'; el.style.left = '0'; el.style.top = '0';
                        el.style.transform = 'none'; 
                        placedTiles.push({el, index: idx});
                        
                        if (el.dataset.raw === '?') { 
                            wildTarget = el; 
                            document.getElementById('wildcard-modal').style.display = 'flex'; 
                        }
                        return;
                    }
                }
                
                document.getElementById('rack').appendChild(el); 
                el.style.width = `${physics.tile.size}px`; el.style.height = `${physics.tile.size}px`;
                el.style.position = 'relative'; el.style.left = 'auto'; el.style.top = 'auto'; 
                el.style.transform = 'none';
            };

            el.addEventListener('touchstart', start, { passive: false });
            window.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('touchend', end, { passive: false });
        }
