<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Cross</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; padding: 20px; display: flex; justify-content: space-between; box-sizing: border-box; letter-spacing: 4px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 1px; width: 95vw; max-width: 500px; aspect-ratio: 1; background: #1a1a1a; border: 1px solid #1a1a1a; margin-top: 20px; }
        .cell { background: #000; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; position: relative; }
        /* Bonus Glows */
        .dd { box-shadow: inset 0 0 10px #FFD700; color: #FFD700; }
        .tw { box-shadow: inset 0 0 10px #E0115F; color: #E0115F; }
        .tl { box-shadow: inset 0 0 10px #7851A9; color: #7851A9; }
        .rack { margin-top: auto; margin-bottom: 40px; display: flex; gap: 8px; }
        .tile { width: 45px; height: 45px; background: linear-gradient(145deg, #222, #000); border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <header><span>BLITZ CROSS</span><span style="color:#FFD700">@LIVE</span></header>
    <div class="grid" id="grid"></div>
    <div class="rack">
        <div class="tile">B</div><div class="tile">L</div><div class="tile">I</div><div class="tile">T</div><div class="tile">Z</div>
    </div>
    <script>
        const grid = document.getElementById('grid');
        const specials = { 0:'DD', 10:'DD', 110:'DD', 120:'DD', 60:'✦' };
        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (specials[i]) {
                cell.className += ' ' + specials[i].toLowerCase();
                cell.innerText = specials[i];
            }
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
