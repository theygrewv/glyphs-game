<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blitz Cross: Noir</title>
    <style>
        :root {
            --bg: #000000;
            --grid-line: #ffffff22;
            --dl: #00FFFF; --tl: #7851A9; --dw: #FF8C00; --tw: #E0115F; --dd: #FFD700;
        }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Perfect Square Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(11, 1fr); 
            width: 95vw; 
            max-width: 480px; 
            aspect-ratio: 1 / 1; /* Forces perfect squares */
            background: var(--grid-line);
            gap: 1px; /* The white grid lines */
            border: 1px solid var(--grid-line);
            margin-top: 20px;
        }

        .cell { 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            font-weight: 900;
            position: relative;
        }

        /* Neon Glow Logic */
        .dl { color: var(--dl); box-shadow: inset 0 0 15px var(--dl); }
        .tl { color: var(--tl); box-shadow: inset 0 0 15px var(--tl); }
        .dw { color: var(--dw); box-shadow: inset 0 0 15px var(--dw); }
        .tw { color: var(--tw); box-shadow: inset 0 0 15px var(--tw); }
        .dd { color: var(--dd); box-shadow: inset 0 0 15px var(--dd); border: 1px solid var(--dd); }
        .start { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

        /* Onyx Squircle Tiles */
        .rack { margin-top: auto; margin-bottom: 40px; display: flex; gap: 10px; }
        .tile {
            width: 48px; height: 48px;
            background: linear-gradient(145deg, #222, #000);
            border-radius: 12px; /* The Squircle */
            border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="grid" id="grid"></div>
    <div class="rack" id="rack"></div>

    <script>
        const grid = document.getElementById('grid');
        // Specific coordinate-based mapping for your 11x11 layout
        const layout = {
            60: { text: 'S', class: 'start' },
            0: { text: 'DD', class: 'dd' }, 10: { text: 'DD', class: 'dd' },
            110: { text: 'DD', class: 'dd' }, 120: { text: 'DD', class: 'dd' },
            5: { text: 'TW', class: 'tw' }, 55: { text: 'TW', class: 'tw' },
            65: { text: 'TW', class: 'tw' }, 115: { text: 'TW', class: 'tw' },
            12: { text: 'DL', class: 'dl' }, 20: { text: 'DL', class: 'dl' },
            100: { text: 'DL', class: 'dl' }, 108: { text: 'DL', class: 'dl' }
        };

        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (layout[i]) {
                cell.innerText = layout[i].text;
                cell.classList.add(layout[i].class);
            }
            grid.appendChild(cell);
        }

        // Generate Sample Rack
        ['B','L','I','T','Z'].forEach(l => {
            const t = document.createElement('div');
            t.className = 'tile'; t.innerText = l;
            document.getElementById('rack').appendChild(t);
        });
    </script>
</body>
</html>
