<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blitz Cross: Obsidian Edition</title>
    <style>
        :root {
            --bg: #000000;
            --grid-line: rgba(255, 255, 255, 0.15);
            --dl: #00FFFF; /* Electric Cyan */
            --tl: #7851A9; /* Royal Purple */
            --dw: #FF8C00; /* Sunset Orange */
            --tw: #E0115F; /* Ruby Red */
            --dd: #FFD700; /* Polished Gold */
            --start: #FFFFFF; /* Pure White */
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            touch-action: none;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            letter-spacing: 6px;
            font-weight: 900;
            font-size: 20px;
            border-bottom: 1px solid #1a1a1a;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Perfect Square Grid System */
        .grid-container {
            width: 95vw;
            max-width: 500px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(11, 1fr); 
            width: 100%;
            aspect-ratio: 1 / 1; 
            background: var(--grid-line);
            gap: 1px; 
            border: 1px solid var(--grid-line);
        }

        .cell { 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 9px; 
            font-weight: 800;
            position: relative;
            text-transform: uppercase;
        }

        /* Neon Glow Effects */
        .start { background: var(--start); color: #000; box-shadow: 0 0 20px var(--start); z-index: 1; border-radius: 2px; }
        .dl { color: var(--dl); box-shadow: inset 0 0 12px var(--dl); }
        .tl { color: var(--tl); box-shadow: inset 0 0 12px var(--tl); }
        .dw { color: var(--dw); box-shadow: inset 0 0 12px var(--dw); }
        .tw { color: var(--tw); box-shadow: inset 0 0 12px var(--tw); }
        .dd { 
            color: var(--dd); 
            box-shadow: inset 0 0 15px var(--dd), 0 0 10px rgba(255,215,0,0.3); 
            border: 1px solid var(--dd); 
            font-size: 11px;
        }

        /* Onyx Squircle Tiles */
        .rack { margin-top: auto; margin-bottom: 40px; display: flex; gap: 10px; padding: 20px; }
        .tile {
            width: 46px; 
            height: 46px;
            background: linear-gradient(145deg, #2a2a2a, #000000);
            border-radius: 12px; /* Perfect Squircle */
            border: 1px solid #444;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 22px; 
            font-weight: 900;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            color: #fff;
        }
        .val {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 8px;
            color: #888;
        }
    </style>
</head>
<body>
