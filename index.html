<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glyphs Game</title>
    <style>
        :root { --bg: #000; --grid-line: rgba(255, 255, 255, 0.2); --gold: #FFD700; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; touch-action: none; }
        .grid { display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); width: 95vw; max-width: 420px; aspect-ratio: 1/1; background: var(--grid-line); gap: 0px; }
        .cell { background: var(--bg); display: flex; align-items: center; justify-content: center; position: relative; border: 0.1px solid rgba(255,255,255,0.05); }
        .tile { width: 44px; height: 44px; background: #fff; color: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; position: absolute; z-index: 10; transition: left 0.3s, bottom 0.3s; }
        .tile.on-board { width: 100%; height: 100%; border-radius: 0; border: 0.5px solid #000; left: 0 !important; top: 0 !important; transition: none; }
        .tile.locked { background: #ddd; pointer-events: none; }
        #ghost-score { position: fixed; padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 12px; display: none; z-index: 2000; transform: translate(-50%, -100%); }
        #ghost-score.valid { background: var(--gold); color: #000; box-shadow: 0 0 10px var(--gold); }
        #ghost-score.invalid { background: #fff; color: #000; opacity: 0.8; }
        .rack-area { width: 100%; height: 80px; position: relative; display: flex; justify-content: center; }
        .controls { padding: 10px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: 900; text-transform: uppercase; }
        .primary { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div id="total-score" style="font-size: 2rem; color: #FFD700;">000</div>
    <div class="grid" id="grid"></div>
    <div id="ghost-score">0</div>
    <div class="controls">
        <button onclick="recallTiles()" class="btn">Recall</button>
        <button onclick="playWord()" class="btn primary">Play</button>
    </div>
    <div class="rack-area" id="rack-container"></div>

    <script>
        // Logic for Bag, Grid, and Rack Reflow
        let dictionary = new Set();
        let placedTiles = [];
        let totalScore = 0;
        const ghost = document.getElementById('ghost-score');

        // Logic to account for "played off of" letters
        function updateLiveScore() {
            if (placedTiles.length === 0) { ghost.style.display = 'none'; return; }
            const sorted = [...placedTiles].sort((a,b) => a.index - b.index);
            const isV = sorted.length > 1 && (Math.abs(sorted[1].index - sorted[0].index) >= 11);
            const step = isV ? 11 : 1;
            let fullWordTiles = [];
            let curr = sorted[0].index;

            while (curr - step >= 0) {
                const p = document.querySelector(`.cell[data-index="${curr - step}"]`);
                if (p?.querySelector('.tile')) {
                    if (!isV && Math.floor((curr-step)/11) !== Math.floor(curr/11)) break;
                    curr -= step;
                } else break;
            }
            while (curr < 121) {
                const cell = document.querySelector(`.cell[data-index="${curr}"]`);
                const tEl = cell?.querySelector('.tile');
                if (tEl) {
                    fullWordTiles.push({ el: tEl, index: curr });
                    if (!isV && Math.floor((curr+step)/11) !== Math.floor(curr/11)) break;
                    curr += step;
                } else if (sorted.some(t => t.index > curr)) { curr += step; continue; }
                else break;
            }

            const wordStr = fullWordTiles.map(t => t.el.innerText[0]).join('');
            const lastTileRect = fullWordTiles[fullWordTiles.length-1].el.getBoundingClientRect();
            ghost.innerText = calculateScore(fullWordTiles);
            ghost.style.display = 'block';
            ghost.style.left = lastTileRect.right + 'px';
            ghost.style.top = lastTileRect.top + 'px';
            ghost.className = dictionary.has(wordStr) ? 'valid' : 'invalid';
        }

        // Add the rest of your core game functions here...
        // (Refill, Drag/Drop, Play logic)
    </script>
</body>
</html>
