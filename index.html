<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blitz Cross: Frosted Edition</title>
    <style>
        :root {
            --bg: #000000;
            --grid-line: rgba(255, 255, 255, 0.15);
            --dl: #00FFFF; --tl: #7851A9; --dw: #FF8C00; --tw: #E0115F; --dd: #FFD700;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100vh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            overflow: hidden; touch-action: none; 
        }
        header { width: 100%; padding: 10px; text-align: center; letter-spacing: 5px; font-weight: 900; border-bottom: 1px solid #111; font-size: 0.9rem; }
        
        .grid { 
            display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); 
            width: 88vw; max-width: 420px; aspect-ratio: 1/1; 
            background: var(--grid-line); gap: 1px; border: 1px solid var(--grid-line);
        }
        .cell { background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 900; position: relative; }
        
        /* Board Glows */
        .s { background: #fff; color: #000; box-shadow: 0 0 15px #fff; border-radius: 2px; font-size: 12px; z-index: 1; }
        .dl { color: var(--dl); box-shadow: inset 0 0 8px var(--dl); }
        .tl { color: var(--tl); box-shadow: inset 0 0 8px var(--tl); }
        .dw { color: var(--dw); box-shadow: inset 0 0 8px var(--dw); }
        .tw { color: var(--tw); box-shadow: inset 0 0 8px var(--tw); }
        .dd { color: var(--dd); box-shadow: inset 0 0 12px var(--dd); border: 1px solid var(--dd); font-size: 9px; }

        /* Hide the star symbol when a tile is inside */
        .cell.occupied.s { color: transparent; box-shadow: none; background: var(--bg); }

        .rack { display: flex; gap: 8px; padding: 20px 10px; width: 100%; justify-content: center; min-height: 80px; pointer-events: none;}

        .tile {
            width: 42px; height: 42px;
            /* LOWER OPACITY (0.7) for shine-through effect */
            background: linear-gradient(135deg, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0.4) 100%);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 20px; font-weight: 900; position: absolute;
            cursor: grab; z-index: 10; user-select: none; pointer-events: auto;
        }
        
        /* Snap-to-board style adjustment */
        .tile.on-board { position: relative; width: 95%; height: 95%; border-radius: 6px; font-size: 16px; box-shadow: none; }
        
        .val { position: absolute; bottom: 2px; right: 4px; font-size: 8px; color: rgba(0,0,0,0.7); }
        .dragging { opacity: 0.9; transform: scale(1.1); z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <header id="status">BLITZ CROSS</header>
    <div class="grid" id="grid"></div>
    <div class="rack" id="rack"></div>

    <script>
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');

        const layout = {
            60: { t: '✦', c: 's' }, 0: { t: 'TL', c: 'tl' }, 10: { t: 'TL', c: 'tl' }, 24: { t: 'TL', c: 'tl' }, 30: { t: 'TL', c: 'tl' },
            90: { t: 'TL', c: 'tl' }, 96: { t: 'TL', c: 'tl' }, 110: { t: 'TL', c: 'tl' }, 120: { t: 'TL', c: 'tl' },
            3: { t: 'TW', c: 'tw' }, 7: { t: 'TW', c: 'tw' }, 33: { t: 'TW', c: 'tw' }, 43: { t: 'TW', c: 'tw' },
            77: { t: 'TW', c: 'tw' }, 87: { t: 'TW', c: 'tw' }, 113: { t: 'TW', c: 'tw' }, 117: { t: 'TW', c: 'tw' },
            12: { t: 'DL', c: 'dl' }, 20: { t: 'DL', c: 'dl' }, 36: { t: 'DL', c: 'dl' }, 40: { t: 'DL', c: 'dl' },
            80: { t: 'DL', c: 'dl' }, 84: { t: 'DL', c: 'dl' }, 100: { t: 'DL', c: 'dl' }, 108: { t: 'DL', c: 'dl' },
            16: { t: 'DW', c: 'dw' }, 48: { t: 'DW', c: 'dw' }, 50: { t: 'DW', c: 'dw' }, 56: { t: 'DW', c: 'dw' },
            104: { t: 'DW', c: 'dw' }, 64: { t: 'DW', c: 'dw' }, 70: { t: 'DW', c: 'dw' }, 72: { t: 'DW', c: 'dw' },
            26: { t: 'DD', c: 'dd' }, 28: { t: 'DD', c: 'dd' }, 46: { t: 'DD', c: 'dd' }, 52: { t: 'DD', c: 'dd' },
            68: { t: 'DD', c: 'dd' }, 74: { t: 'DD', c: 'dd' }, 92: { t: 'DD', c: 'dd' }, 94: { t: 'DD', c: 'dd' }
        };

        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            if (layout[i]) { cell.innerText = layout[i].t; cell.classList.add(layout[i].c); }
            grid.appendChild(cell);
        }

        const distribution = [
            {l:'E',v:1,q:10},{l:'A',v:1,q:8},{l:'I',v:1,q:7},{l:'O',v:1,q:7},{l:'N',v:1,q:5},{l:'R',v:1,q:5},{l:'T',v:1,q:5},{l:'L',v:1,q:4},
            {l:'S',v:1,q:4},{l:'D',v:2,q:4},{l:'U',v:2,q:4},{l:'G',v:2,q:3},{l:'H',v:3,q:2},{l:'M',v:3,q:2},{l:'Y',v:3,q:2},{l:'B',v:4,q:2},
            {l:'C',v:4,q:2},{l:'F',v:4,q:2},{l:'P',v:4,q:2},{l:'W',v:4,q:2},{l:'K',v:5,q:1},{l:'V',v:5,q:2},{l:'J',v:8,q:1},{l:'X',v:8,q:1},
            {l:'Q',v:10,q:1},{l:'Z',v:10,q:1},{l:'?',v:0,q:2}
        ];

        let bag = [];
        distribution.forEach(item => { for(let i=0; i<item.q; i++) bag.push({...item}); });
        bag.sort(() => Math.random() - 0.5);

        function initRack() {
            const screenW = window.innerWidth;
            for(let i=0; i<7; i++) {
                const data = bag.pop();
                const t = document.createElement('div');
                t.className = 'tile';
                t.innerHTML = `<span>${data.l==='?'?'':data.l}</span><span class="val">${data.v}</span>`;
                t.dataset.letter = data.l;
                t.dataset.value = data.v;
                
                t.style.left = `${(screenW / 2 - 175) + (i * 50)}px`;
                t.style.bottom = `40px`;
                
                addDragListeners(t);
                document.body.appendChild(t);
            }
        }

        function addDragListeners(el) {
            let offsetX, offsetY;
            
            const onStart = (e) => {
                const touch = e.type === 'touchstart' ? e.touches[0] : e;
                offsetX = touch.clientX - el.getBoundingClientRect().left;
                offsetY = touch.clientY - el.getBoundingClientRect().top;
                el.classList.add('dragging');
                
                if(el.dataset.letter === '?' && el.querySelector('span').innerText === '') {
                    let c = prompt("Wild Card Letter:");
                    if(c) { 
                        el.querySelector('span').innerText = c.toUpperCase(); 
                        el.dataset.value = 2; 
                        el.querySelector('.val').innerText = 2; 
                        el.style.color = '#E0115F';
                    }
                }
            };

            const onMove = (e) => {
                if (!el.classList.contains('dragging')) return;
                const touch = e.type === 'touchmove' ? e.touches[0] : e;
                el.style.left = `${touch.clientX - offsetX}px`;
                el.style.top = `${touch.clientY - offsetY}px`;
                el.style.bottom = 'auto';
            };

            const onEnd = (e) => {
                el.classList.remove('dragging');
                const rect = el.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                
                el.style.display = 'none';
                const target = document.elementFromPoint(centerX, centerY);
                el.style.display = 'flex';

                const cell = target?.closest('.cell');
                if (cell && !cell.querySelector('.tile')) {
                    el.classList.add('on-board');
                    el.style.left = '0'; el.style.top = '0'; el.style.position = 'relative';
                    cell.appendChild(el);
                    cell.classList.add('occupied');
                    
                    if(cell.dataset.index == "60") {
                        status.innerText = "CENTER COVERED - PLAY ON";
                    }
                } else {
                    // Reset if not on cell
                    el.classList.remove('on-board');
                    el.style.position = 'absolute';
                    el.style.top = 'auto'; el.style.bottom = '40px';
                }
            };

            el.addEventListener('mousedown', onStart);
            el.addEventListener('touchstart', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove);
            el.addEventListener('mouseup', onEnd);
            el.addEventListener('touchend', onEnd);
        }

        initRack();
    </script>
</body>
</html>
