<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glyphs: Lexicon Engine</title>
    <style id="dynamic-styles">
        /* Base Shell - Everything else comes from Lexicon */
        :root { --bg: #000; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; touch-action: none; padding: 20px 0; }
        .grid { display: grid; width: 92vw; max-width: 400px; aspect-ratio: 1/1; }
        .cell { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; height: 100%; font-size: 8px; font-weight: 900; }
        .tile { width: 46px; height: 46px; background: #fff; color: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; position: absolute; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .tile.on-board { width: 100%; height: 100%; border-radius: 0; left: 0 !important; top: 0 !important; }
        .val { position: absolute; bottom: 2px; right: 4px; font-size: 9px; opacity: 0.6; }
        .controls { display: flex; gap: 10px; }
        .btn { background: #222; color: #fff; border: none; padding: 14px 24px; border-radius: 30px; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; }
        .primary { background: #fff; color: #000; }
    </style>
</head>
<body>
    <header><div id="total-score" style="font-size: 2.2rem; font-weight: 900;">000</div></header>
    <div class="grid" id="grid"></div>
    <div class="controls" id="ui-controls"></div>
    <div id="rack" style="height: 100px; width: 100%; position: relative;"></div>

    <script>
        let layout, board, tiles, theme, bag = [];

        async function startEngine() {
            try {
                // 1. Fetch Lexicons
                const [l, b, t, th] = await Promise.all([
                    fetch('./lexicon/layout.json').then(r => r.json()),
                    fetch('./lexicon/board.json').then(r => r.json()),
                    fetch('./lexicon/tiles.json').then(r => r.json()),
                    fetch('./lexicon/theme.json').then(r => r.json())
                ]);
                
                layout = l; board = b; tiles = t; theme = th;

                // 2. Build the app from Lexicon data
                applyLexiconTheme();
                buildGrid();
                initGameSystems();
                
                console.log("App built successfully from Lexicon 🤙🏽");
            } catch (e) { console.error("Lexicon parse error:", e); }
        }

        function applyLexiconTheme() {
            const root = document.documentElement.style;
            // Inject Colors
            Object.keys(theme.colors).forEach(key => root.setProperty(`--${key}`, theme.colors[key]));
            
            // Inject Grid Geometry
            root.setProperty('--cols', board.cols);
            root.setProperty('--gap', board.gap || '1px');
            
            // Build the Glow CSS dynamically based on Lexicon effects
            const styleSheet = document.createElement("style");
            styleSheet.innerText = `
                body { background: var(--bg); }
                .grid { grid-template-columns: repeat(${board.cols}, 1fr); gap: var(--gap); border: 1px solid var(--gridLine); }
                .cell { background: var(--obsidian); backdrop-filter: blur(${theme.effects.blurStrength}); -webkit-backdrop-filter: blur(${theme.effects.blurStrength}); }
                .dl { color: var(--dl); text-shadow: 0 0 8px var(--dl); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--dl); }
                .tl { color: var(--tl); text-shadow: 0 0 8px var(--tl); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--tl); }
                .dw { color: var(--dw); text-shadow: 0 0 8px var(--dw); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--dw); }
                .tw { color: var(--tw); text-shadow: 0 0 8px var(--tw); box-shadow: inset 0 0 ${theme.effects.glowSize} var(--tw); }
                .dd { color: var(--dd); text-shadow: 0 0 8px var(--dd); box-shadow: inset 0 0 ${theme.effects.ddGlowSize} var(--dd); }
                .s { background: #fff; color: #000; font-size: 22px; width: 90%; height: 90%; }
                #total-score { color: var(--gold); }
            `;
            document.head.appendChild(styleSheet);
        }

        function buildGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for(let i=0; i < board.size; i++) {
                const c = document.createElement('div');
                c.className = 'cell';
                if(layout[i]) {
                    c.innerText = layout[i].t;
                    c.classList.add(layout[i].c);
                }
                g.appendChild(c);
            }
        }

        function initGameSystems() {
            // Build Bag from tiles.json
            tiles.distribution.forEach(d => { for(let i=0; i<d.q; i++) bag.push({...d}); });
            bag.sort(() => Math.random() - 0.5);
            
            // Build UI Buttons
            const ctrl = document.getElementById('ui-controls');
            ctrl.innerHTML = `
                <button class="btn" onclick="location.reload()">Reset</button>
                <button class="btn primary">Play Word</button>
            `;
            
            refillRack();
        }

        function refillRack() {
            const startX = (window.innerWidth / 2) - ((7 * 50) / 2);
            for(let i=0; i < 7 && bag.length; i++) {
                const data = bag.pop();
                const t = document.createElement('div');
                t.className = 'tile';
                t.innerHTML = `<span>${data.l === '?' ? '' : data.l}</span><span class="val">${data.v}</span>`;
                t.style.left = `${startX + (i * 50)}px`;
                t.style.bottom = "25px";
                document.body.appendChild(t);
            }
        }

        startEngine();
    </script>
</body>
</html>
