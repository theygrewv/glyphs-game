<script>
    const grid = document.getElementById('grid');
    
    // THE 8-DD MASTER LAYOUT
    const layout = {
        // [S] Start Square
        60: { t: '✦', c: 's' },
        
        // DD (Polished Gold) - 8 Total Squares
        0: { t: 'DD', c: 'dd' }, 10: { t: 'DD', c: 'dd' },    // Top Corners
        110: { t: 'DD', c: 'dd' }, 120: { t: 'DD', c: 'dd' }, // Bottom Corners
        5: { t: 'DD', c: 'dd' },                            // Top Mid
        115: { t: 'DD', c: 'dd' },                          // Bottom Mid
        55: { t: 'DD', c: 'dd' },                           // Left Mid
        65: { t: 'DD', c: 'dd' },                           // Right Mid

        // TW (Ruby Red) - The Diamond Points
        27: { t: 'TW', c: 'tw' }, 33: { t: 'TW', c: 'tw' },
        87: { t: 'TW', c: 'tw' }, 93: { t: 'TW', c: 'tw' },

        // DW (Sunset Orange) - Inner Frame
        37: { t: 'DW', c: 'dw' }, 39: { t: 'DW', c: 'dw' },
        49: { t: 'DW', c: 'dw' }, 51: { t: 'DW', c: 'dw' },
        69: { t: 'DW', c: 'dw' }, 71: { t: 'DW', c: 'dw' },
        81: { t: 'DW', c: 'dw' }, 83: { t: 'DW', c: 'dw' },

        // TL (Royal Purple)
        24: { t: 'TL', c: 'tl' }, 30: { t: 'TL', c: 'tl' },
        90: { t: 'TL', c: 'tl' }, 96: { t: 'TL', c: 'tl' },
        12: { t: 'TL', c: 'tl' }, 20: { t: 'TL', c: 'tl' },
        100: { t: 'TL', c: 'tl' }, 108: { t: 'TL', c: 'tl' },

        // DL (Electric Cyan)
        2: { t: 'DL', c: 'dl' }, 8: { t: 'DL', c: 'dl' },
        44: { t: 'DL', c: 'dl' }, 54: { t: 'DL', c: 'dl' },
        66: { t: 'DL', c: 'dl' }, 76: { t: 'DL', c: 'dl' },
        112: { t: 'DL', c: 'dl' }, 118: { t: 'DL', c: 'dl' }
    };

    // Render the Grid
    for (let i = 0; i < 121; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (layout[i]) {
            cell.innerText = layout[i].t;
            cell.classList.add(layout[i].c);
        }
        grid.appendChild(cell);
    }

    // Render the Onyx Rack
    const hand = [{l:'B',v:4},{l:'L',v:1},{l:'I',v:1},{l:'T',v:1},{l:'Z',v:10},{l:'C',v:4},{l:'X',v:8}];
    hand.forEach(p => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `${p.l}<span class="val">${p.v}</span>`;
        document.getElementById('rack').appendChild(t);
    });
</script>
