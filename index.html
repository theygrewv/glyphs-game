<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blitz Cross: Double-Double Edition</title>
    <style>
        :root {
            --bg: #000000;
            --grid-line: rgba(255, 255, 255, 0.15);
            --dl: #00FFFF; --tl: #7851A9; --dw: #FF8C00; --tw: #E0115F; --dd: #FFD700;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); color: #fff; margin: 0; font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100vh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            overflow: hidden; touch-action: none; 
        }
        header { width: 100%; padding: 10px; text-align: center; border-bottom: 1px solid #111; }
        .score-box { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .status-msg { font-size: 0.7rem; letter-spacing: 3px; opacity: 0.8; margin-top: 5px; text-transform: uppercase; min-height: 1em;}

        .grid { 
            display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); 
            width: 90vw; max-width: 420px; aspect-ratio: 1/1; 
            background: var(--grid-line); gap: 1px; border: 1px solid var(--grid-line);
        }
        .cell { background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 900; position: relative; }
        
        .s { background: #fff; color: #000; box-shadow: 0 0 15px #fff; border-radius: 2px; font-size: 12px; z-index: 1; }
        .dl { color: var(--dl); box-shadow: inset 0 0 8px var(--dl); }
        .tl { color: var(--tl); box-shadow: inset 0 0 8px var(--tl); }
        .dw { color: var(--dw); box-shadow: inset 0 0 8px var(--dw); }
        .tw { color: var(--tw); box-shadow: inset 0 0 8px var(--tw); }

        .cell.occupied.s { color: transparent; box-shadow: none; background: var(--bg); }

        .controls { width: 100%; display: flex; justify-content: center; gap: 8px; padding: 10px; }
        .btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 12px 18px; border-radius: 30px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 0.6rem; transition: 0.2s;
        }
        .btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.15); }
        .btn.primary { background: #fff; color: #000; border: none; }

        .rack { display: flex; gap: 8px; width: 100%; justify-content: center; min-height: 60px; pointer-events: none;}

        .tile {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #fff 0%, #bbb 100%);
            border-radius: 4px; border: 1px solid #555;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-size: 22px; font-weight: 900; position: absolute;
            cursor: grab; z-index: 10; user-select: none; pointer-events: auto;
        }
        .tile.on-board { position: absolute; width: 100%; height: 100%; border-radius: 0; left: 0 !important; top: 0 !important; }
        .tile.locked { opacity: 1; pointer-events: none; background: #eee; border: 0.5px solid #000; }
        .tile.invalid { box-shadow: 0 0 20px #ff0000 !important; }

        @keyframes successPulse {
            0% { transform: scale(1); box-shadow: 0 0 5px #fff; }
            50% { transform: scale(1.1); box-shadow: 0 0 30px #fff; }
            100% { transform: scale(1); box-shadow: 0 0 5px #fff; }
        }
        .tile.valid-word { animation: successPulse 0.6s ease-in-out; border: 2px solid #fff !important; }
        
        .val { position: absolute; bottom: 2px; right: 4px; font-size: 9px; color: rgba(0,0,0,0.6); }
        .dragging { opacity: 0.8; transform: scale(1.2); z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <header>
        <div class="score-box" id="total-score">000</div>
        <div class="status-msg" id="status">CONNECTING LEXICON...</div>
    </header>

    <div class="grid" id="grid"></div>
    
    <div class="controls">
        <button id="recall-btn" class="btn">Recall</button>
        <button id="shuffle-btn" class="btn">Shuffle</button>
        <button id="play-btn" class="btn primary">Play Word</button>
    </div>
    
    <div class="rack" id="rack"></div>

    <script>
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');
        const totalScoreEl = document.getElementById('total-score');
        const playBtn = document.getElementById('play-btn');
        const recallBtn = document.getElementById('recall-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        
        let totalScore = 0;
        let placedTiles = [];
        let dictionary = new Set();
        const DICTIONARY_URL = 'https://raw.githubusercontent.com/dolph/dictionary/master/enable1.txt';

        const layout = { 60: { t: '✦', c: 's' }, 0: { t: 'TL', c: 'tl' }, 10: { t: 'TL', c: 'tl' }, 24: { t: 'TL', c: 'tl' }, 30: { t: 'TL', c: 'tl' }, 90: { t: 'TL', c: 'tl' }, 96: { t: 'TL', c: 'tl' }, 110: { t: 'TL', c: 'tl' }, 120: { t: 'TL', c: 'tl' }, 3: { t: 'TW', c: 'tw' }, 7: { t: 'TW', c: 'tw' }, 33: { t: 'TW', c: 'tw' }, 43: { t: 'TW', c: 'tw' }, 77: { t: 'TW', c: 'tw' }, 87: { t: 'TW', c: 'tw' }, 113: { t: 'TW', c: 'tw' }, 117: { t: 'TW', c: 'tw' }, 12: { t: 'DL', c: 'dl' }, 20: { t: 'DL', c: 'dl' }, 36: { t: 'DL', c: 'dl' }, 40: { t: 'DL', c: 'dl' }, 80: { t: 'DL', c: 'dl' }, 84: { t: 'DL', c: 'dl' }, 100: { t: 'DL', c: 'dl' }, 108: { t: 'DL', c: 'dl' }, 16: { t: 'DW', c: 'dw' }, 48: { t: 'DW', c: 'dw' }, 50: { t: 'DW', c: 'dw' }, 56: { t: 'DW', c: 'dw' }, 104: { t: 'DW', c: 'dw' }, 64: { t: 'DW', c: 'dw' }, 70: { t: 'DW', c: 'dw' }, 72: { t: 'DW', c: 'dw' } };

        for (let i = 0; i < 121; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            if (layout[i]) { cell.innerText = layout[i].t; cell.classList.add(layout[i].c); }
            grid.appendChild(cell);
        }

        const distribution = [{l:'E',v:1,q:10},{l:'A',v:1,q:8},{l:'I',v:1,q:7},{l:'O',v:1,q:7},{l:'N',v:1,q:5},{l:'R',v:1,q:5},{l:'T',v:1,q:5},{l:'L',v:1,q:4},{l:'S',v:1,q:4},{l:'D',v:2,q:4},{l:'U',v:2,q:4},{l:'G',v:2,q:3},{l:'H',v:3,q:2},{l:'M',v:3,q:2},{l:'Y',v:3,q:2},{l:'B',v:4,q:2},{l:'C',v:4,q:2},{l:'F',v:4,q:2},{l:'P',v:4,q:2},{l:'W',v:4,q:2},{l:'K',v:5,q:1},{l:'V',v:5,q:2},{l:'J',v:8,q:1},{l:'X',v:8,q:1},{l:'Q',v:10,q:1},{l:'Z',v:10,q:1},{l:'?',v:0,q:2}];
        let bag = [];
        distribution.forEach(item => { for(let i=0; i<item.q; i++) bag.push({...item}); });

        async function loadLexicon() {
            try {
                const response = await fetch(DICTIONARY_URL);
                const text = await response.text();
                dictionary = new Set(text.split('\n').map(w => w.trim().toUpperCase()).filter(w => w.length >= 2));
                status.innerText = "READY TO BLITZ";
            } catch (e) { status.innerText = "OFFLINE MODE"; }
        }

        // --- UPDATED DOUBLE-DOUBLE SCORING ---
        function calculateScore(tiles) {
            let wordMultiplier = 1;
            let letterSum = 0;
            let multipliersFound = { dl: false, dw: false };

            tiles.forEach(t => {
                let val = parseInt(t.el.dataset.value);
                const cell = t.el.parentElement;

                // Letter Multipliers
                if (cell.classList.contains('dl')) {
                    val *= 2;
                    multipliersFound.dl = true;
                } else if (cell.classList.contains('tl')) {
                    val *= 3;
                }

                // Word Multipliers
                if (cell.classList.contains('dw') || cell.classList.contains('s')) {
                    wordMultiplier *= 2;
                    multipliersFound.dw = true;
                } else if (cell.classList.contains('tw')) {
                    wordMultiplier *= 3;
                }

                letterSum += val;
            });

            let total = letterSum * wordMultiplier;

            // Check for Double-Double alert
            if (multipliersFound.dl && multipliersFound.dw) {
                status.innerText = "DOUBLE-DOUBLE!";
            }

            if (tiles.length === 7) {
                total += 40;
                status.innerText = "BINGO! +40 BONUS";
            }
            return total;
        }

        function refillHand() {
            const current = document.querySelectorAll('.tile:not(.locked)');
            const needed = 7 - current.length;
            const rackStart = window.innerWidth / 2 - 175;
            const usedPos = Array.from(current).map(t => t.dataset.origLeft);
            const emptyPos = Array.from({length: 7}, (_, i) => `${rackStart + (i * 50)}px`).filter(p => !usedPos.includes(p));

            for (let i = 0; i < Math.min(needed, bag.length); i++) {
                const data = bag.pop();
                const t = document.createElement('div');
                t.className = 'tile';
                t.innerHTML = `<span>${data.l==='?'?'':data.l}</span><span class="val">${data.v}</span>`;
                t.dataset.letter = data.l; t.dataset.value = data.v; t.dataset.origLeft = emptyPos[i];
                t.style.left = emptyPos[i]; t.style.bottom = "-60px";
                addDrag(t); document.body.appendChild(t);
                setTimeout(() => { t.style.transition = '0.5s cubic-bezier(0.17,0.88,0.32,1.2)'; t.style.bottom = "40px"; }, i * 100);
            }
        }

        function addDrag(el) {
            let ox, oy;
            const start = (e) => {
                if (el.classList.contains('locked')) return;
                const touch = e.type.includes('touch') ? e.touches[0] : e;
                const r = el.getBoundingClientRect();
                ox = touch.clientX - r.left; oy = touch.clientY - r.top;
                if(el.parentElement.classList.contains('cell')) {
                    el.parentElement.classList.remove('occupied');
                    placedTiles = placedTiles.filter(p => p.el !== el);
                    document.body.appendChild(el);
                    el.classList.remove('on-board');
                    el.style.position = 'absolute'; el.style.left = `${r.left}px`; el.style.top = `${r.top}px`;
                }
                el.classList.add('dragging');
                if(el.dataset.letter === '?' && el.querySelector('span').innerText === '') {
                    let c = prompt("Wild Card:");
                    if(c) el.querySelector('span').innerText = c.toUpperCase();
                }
            };
            const move = (e) => {
                if (!el.classList.contains('dragging')) return;
                const touch = e.type.includes('touch') ? e.touches[0] : e;
                el.style.left = `${touch.clientX - ox}px`; el.style.top = `${touch.clientY - oy}px`; el.style.bottom = 'auto';
            };
            const end = () => {
                if (!el.classList.contains('dragging')) return;
                el.classList.remove('dragging');
                const r = el.getBoundingClientRect(); el.style.display = 'none';
                const target = document.elementFromPoint(r.left + 22, r.top + 22);
                el.style.display = 'flex';
                const cell = target?.closest('.cell');
                if (cell && !cell.classList.contains('occupied')) {
                    el.classList.add('on-board'); cell.appendChild(el); cell.classList.add('occupied');
                    placedTiles.push({ el: el, index: parseInt(cell.dataset.index) });
                } else { returnHome(el); }
            };
            el.addEventListener('touchstart', start); window.addEventListener('touchmove', move); window.addEventListener('touchend', end);
            el.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        }

        function returnHome(el, d = 0) {
            if (el.parentElement.classList.contains('cell')) el.parentElement.classList.remove('occupied');
            document.body.appendChild(el);
            el.classList.remove('on-board'); el.style.zIndex = '200';
            setTimeout(() => {
                el.style.transition = '0.5s ease'; el.style.left = el.dataset.origLeft; el.style.bottom = '40px'; el.style.top = 'auto';
                setTimeout(() => { el.style.transition = ''; el.style.zIndex = '10'; }, 500);
            }, d);
        }

        playBtn.addEventListener('click', () => {
            if (placedTiles.length === 0) return;
            const sorted = [...placedTiles].sort((a,b) => a.index - b.index);
            const word = sorted.map(t => t.el.querySelector('span').innerText).join('');
            
            if (!dictionary.has(word)) {
                status.innerText = `INVALID: ${word}`;
                placedTiles.forEach(t => t.el.classList.add('invalid'));
                return;
            }

            const locked = document.querySelectorAll('.tile.locked');
            const connected = locked.length === 0 ? placedTiles.some(t => t.index === 60) :
                placedTiles.some(t => [t.index-1, t.index+1, t.index-11, t.index+11].some(n => {
                    const c = document.querySelector(`.cell[data-index="${n}"]`);
                    return c && c.querySelector('.tile.locked');
                }));

            if (!connected) {
                status.innerText = locked.length === 0 ? "START AT CENTER" : "CONNECT TILES";
                return;
            }

            const points = calculateScore(placedTiles);
            totalScore += points;
            totalScoreEl.innerText = totalScore.toString().padStart(3, '0');
            if (!status.innerText.includes("BINGO") && !status.innerText.includes("DOUBLE")) {
                status.innerText = `+${points} POINTS!`;
            }

            sorted.forEach((t, i) => setTimeout(() => t.el.classList.add('valid-word'), i * 80));
            setTimeout(() => {
                placedTiles.forEach(t => {
                    t.el.classList.remove('valid-word'); t.el.classList.add('locked');
                    t.el.parentElement.classList.add('occupied');
                });
                placedTiles = []; refillHand();
            }, 1000);
        });

        shuffleBtn.addEventListener('click', () => {
            const hand = [...document.querySelectorAll('.tile:not(.on-board):not(.locked)')];
            const pos = hand.map(t => t.dataset.origLeft).sort(() => Math.random() - 0.5);
            hand.forEach((t, i) => { t.dataset.origLeft = pos[i]; returnHome(t, i * 30); });
        });

        recallBtn.addEventListener('click', () => {
            const onB = [...document.querySelectorAll('.tile.on-board')];
            placedTiles = []; onB.forEach((t, i) => returnHome(t, i * 50));
        });

        loadLexicon(); bag.sort(() => Math.random() - 0.5); refillHand();
    </script>
</body>
</html>
