<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Glyphs</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --text: #ffffff;
            --gold: #D4AF37;
            --obsidian: linear-gradient(145deg, #222222, #0d0d0d);
        }
        
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeUp 1s ease-out;
        }

        .title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        .subtitle {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 4px;
            margin-top: -5px;
            opacity: 0.8;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80vw;
            max-width: 300px;
            animation: fadeUp 1.2s ease-out;
        }

        .menu-btn {
            background: var(--obsidian);
            color: var(--text);
            border: 1px solid #333;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.05), inset -3px -3px 6px rgba(0,0,0,0.8), 0 4px 15px rgba(0,0,0,0.5);
        }

        .menu-btn:active {
            transform: scale(0.96);
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.9);
        }

        .menu-btn.primary {
            color: var(--gold);
            border-color: var(--gold);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2), inset -3px -3px 6px rgba(0,0,0,0.8), 0 4px 15px rgba(0,0,0,0.5);
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="title" id="home-title">...</h1>
        <div class="subtitle" id="home-subtitle">...</div>
    </div>

    <div class="menu-container" id="menu-container">
        </div>

    <script>
        async function buildHome() {
            try {
                const res = await fetch('./lexicon/home.json');
                const data = await res.json();
                
                // Inject Branding
                document.getElementById('home-title').innerText = data.branding.title;
                document.getElementById('home-subtitle').innerText = data.branding.subtitle;

                // Inject Menu
                const container = document.getElementById('menu-container');
                container.innerHTML = ''; // clear loading state
                
                data.menu.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = `menu-btn ${item.style}`;
                    btn.id = item.id;
                    btn.innerText = item.text;
                    
                    btn.onclick = () => {
                        if (item.route !== '#') {
                            window.location.href = item.route;
                        } else {
                            // Placeholder for settings modal later
                            btn.innerText = "COMING SOON";
                            setTimeout(() => btn.innerText = item.text, 1000);
                        }
                    };
                    
                    container.appendChild(btn);
                });
            } catch(e) {
                console.error("Failed to load home lexicon", e);
            }
        }

        buildHome();
    </script>
</body>
</html>
